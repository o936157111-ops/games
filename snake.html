<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典復古貪食蛇 - RWD優化版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #222;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            /* 修正：改為 flex-start 讓內容從頂部開始，並允許捲動 */
            align-items: flex-start;
            min-height: 100vh;
            color: #fff;
            padding: 10px;
            overflow-y: auto;
        }

        .phone-container {
            background-color: #333;
            border: 4px solid #444;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 修正：限制最大高度，內容過長時產生捲軸 */
            max-height: 95vh;
            overflow-y: auto;
        }

        .screen {
            background-color: #8fa382;
            border: 6px solid #111;
            border-radius: 4px;
            width: 100%;
            padding: 10px;
            position: relative;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            color: #2b3a22;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 1px solid #2b3a22;
            padding-bottom: 4px;
        }

        canvas {
            background-color: #8fa382;
            display: block;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
        }

        .overlay {
            position: absolute;
            top: 40px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            background-color: rgba(143, 163, 130, 0.9);
            color: #2b3a22;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            font-weight: bold;
            text-align: center;
        }

        .overlay h2 { margin-bottom: 10px; font-size: 24px; }
        .overlay p { font-size: 14px; }

        .controls {
            width: 100%;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            background-color: #555;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:active { background-color: #777; }

        .speed-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #444;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        .speed-control select {
            background: #555;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        .d-pad {
            margin-top: 15px; /* 稍微縮小間距 */
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 10px;
            justify-content: center;
        }

        .d-btn {
            background-color: #222;
            color: #fff;
            border: 2px solid #444;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 0 #111;
        }
        .d-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #111;
        }
        .d-btn.up { grid-column: 2; grid-row: 1; }
        .d-btn.left { grid-column: 1; grid-row: 2; }
        .d-btn.right { grid-column: 3; grid-row: 2; }
        .d-btn.down { grid-column: 2; grid-row: 3; }

        .pc-tip {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
            text-align: center;
            padding-bottom: 10px; /* 增加底部緩衝 */
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="screen">
        <div class="status-bar">
            <span id="score-display">SCORE: 0000</span>
            <span id="hi-score-display">HI: 0000</span>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="gameOverlay" class="overlay">
            <h2 id="overlayTitle">SNAKE GAME</h2>
            <p id="overlaySub">點擊下方 START 開始遊戲</p>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn">START</button>
        <div class="speed-control">
            <label for="speedSelect">速度(難度):</label>
            <select id="speedSelect">
                <option value="150">新手 (慢)</option>
                <option value="100" selected>經典 (中)</option>
                <option value="60">高手 (快)</option>
            </select>
        </div>
    </div>

    <div class="d-pad">
        <button class="d-btn up" data-dir="UP">▲</button>
        <button class="d-btn left" data-dir="LEFT">◀</button>
        <button class="d-btn right" data-dir="RIGHT">▶</button>
        <button class="d-btn down" data-dir="DOWN">▼</button>
    </div>

    <div class="pc-tip">電腦玩家亦可直接使用鍵盤方向鍵操作</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score-display');
    const hiScoreDisplay = document.getElementById('hi-score-display');
    const startBtn = document.getElementById('startBtn');
    const speedSelect = document.getElementById('speedSelect');
    const gameOverlay = document.getElementById('gameOverlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlaySub = document.getElementById('overlaySub');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [];
    let food = { x: 0, y: 0 };
    let dx = 0;
    let dy = 0;
    let score = 0;
    let highScore = localStorage.getItem('snakeHighScore') || 0;
    let gameInterval = null;
    let isGameOver = true;
    let isPaused = false;
    let nextDirection = { x: 0, y: 0 };

    hiScoreDisplay.textContent = `HI: ${String(highScore).padStart(4, '0')}`;

    function initGame() {
        snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
        generateFood();
        dx = 1; dy = 0;
        nextDirection = { x: 1, y: 0 };
        score = 0;
        updateScoreDisplay();
        isGameOver = false;
        isPaused = false;
        gameOverlay.style.display = 'none';
        startBtn.textContent = 'PAUSE';
        if (gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(gameLoop, speedSelect.value);
    }

    function gameLoop() {
        if (isPaused || isGameOver) return;
        dx = nextDirection.x;
        dy = nextDirection.y;
        const head = { x: snake[0].x + dx, y: snake[0].y + dy };
        if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) { endGame(); return; }
        for (let i = 0; i < snake.length; i++) {
            if (snake[i].x === head.x && snake[i].y === head.y) { endGame(); return; }
        }
        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            score += 10;
            updateScoreDisplay();
            generateFood();
        } else {
            snake.pop();
        }
        draw();
    }

    function draw() {
        ctx.fillStyle = '#8fa382';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#2b3a22';
        snake.forEach(part => {
            ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
        });
        ctx.fillStyle = '#1a2414';
        ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);
    }

    function generateFood() {
        food.x = Math.floor(Math.random() * tileCount);
        food.y = Math.floor(Math.random() * tileCount);
        snake.forEach(part => { if (part.x === food.x && part.y === food.y) generateFood(); });
    }

    function updateScoreDisplay() {
        scoreDisplay.textContent = `SCORE: ${String(score).padStart(4, '0')}`;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('snakeHighScore', highScore);
            hiScoreDisplay.textContent = `HI: ${String(highScore).padStart(4, '0')}`;
        }
    }

    function endGame() {
        isGameOver = true;
        clearInterval(gameInterval);
        overlayTitle.textContent = 'GAME OVER';
        overlaySub.textContent = `最終得分: ${score}\n點擊 START 重新挑戰`;
        gameOverlay.style.display = 'flex';
        startBtn.textContent = 'START';
    }

    function togglePause() {
        if (isGameOver) { initGame(); return; }
        isPaused = !isPaused;
        if (isPaused) {
            startBtn.textContent = 'RESUME';
            overlayTitle.textContent = '遊戲暫停';
            overlaySub.textContent = '點擊 RESUME 繼續遊戲';
            gameOverlay.style.display = 'flex';
        } else {
            startBtn.textContent = 'PAUSE';
            gameOverlay.style.display = 'none';
        }
    }

    function changeDirection(dir) {
        if (isPaused || isGameOver) return;
        switch (dir) {
            case 'UP': if (dy !== 1) nextDirection = { x: 0, y: -1 }; break;
            case 'DOWN': if (dy !== -1) nextDirection = { x: 0, y: 1 }; break;
            case 'LEFT': if (dx !== 1) nextDirection = { x: -1, y: 0 }; break;
            case 'RIGHT': if (dx !== -1) nextDirection = { x: 1, y: 0 }; break;
        }
    }

    window.addEventListener('keydown', e => {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
        if (e.key === 'ArrowUp') changeDirection('UP');
        if (e.key === 'ArrowDown') changeDirection('DOWN');
        if (e.key === 'ArrowLeft') changeDirection('LEFT');
        if (e.key === 'ArrowRight') changeDirection('RIGHT');
        if (e.key === ' ') togglePause();
    });

    startBtn.addEventListener('click', togglePause);
    document.querySelectorAll('.d-btn').forEach(btn => {
        const handlePress = (e) => {
            e.preventDefault();
            changeDirection(btn.getAttribute('data-dir'));
        };
        btn.addEventListener('mousedown', handlePress);
        btn.addEventListener('touchstart', handlePress);
    });

    speedSelect.addEventListener('change', () => {
        if (!isGameOver && !isPaused) {
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, speedSelect.value);
        }
    });

    draw();
</script>

</body>
</html>
