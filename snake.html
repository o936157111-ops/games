<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>貪食蛇 - 完整修復版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #222; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .phone-container {
            height: 95vh;
            aspect-ratio: 1 / 2;
            background: #333;
            border: 4px solid #444;
            border-radius: 20px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .screen { flex: 1; background: #8fa382; border: 4px solid #111; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }

        .btn-area { display: flex; flex-direction: column; gap: 5px; }
        .btn { padding: 10px; background: #555; color: #fff; border: none; border-radius: 8px; cursor: pointer; }

        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .d-btn { 
            background: #222; color: #fff; border: 2px solid #444; 
            border-radius: 50%; aspect-ratio: 1/1; cursor: pointer; 
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="screen">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>
    <div class="btn-area">
        <button id="startBtn" class="btn">START / PAUSE</button>
        <div class="d-pad">
            <button class="d-btn" style="grid-column: 2;" data-dir="UP">▲</button>
            <button class="d-btn" style="grid-column: 1; grid-row: 2;" data-dir="LEFT">◀</button>
            <button class="d-btn" style="grid-column: 3; grid-row: 2;" data-dir="RIGHT">▶</button>
            <button class="d-btn" style="grid-column: 2; grid-row: 3;" data-dir="DOWN">▼</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let snake = [{x:10, y:10}], food = {x:5, y:5}, nextDir={x:1, y:0}, isPaused=true;
    
    function draw() {
        ctx.fillStyle = '#8fa382'; ctx.fillRect(0,0,400,400);
        ctx.fillStyle = '#2b3a22';
        snake.forEach(p => ctx.fillRect(p.x*20+1, p.y*20+1, 18, 18));
        ctx.fillStyle = '#1a2414'; ctx.fillRect(food.x*20+2, food.y*20+2, 16, 16);
    }

    // 統一的方向變更邏輯
    function setDirection(dir) {
        if(isPaused) return;
        if(dir==='UP' && nextDir.y !== 1) nextDir = {x:0, y:-1};
        else if(dir==='DOWN' && nextDir.y !== -1) nextDir = {x:0, y:1};
        else if(dir==='LEFT' && nextDir.x !== 1) nextDir = {x:-1, y:0};
        else if(dir==='RIGHT' && nextDir.x !== -1) nextDir = {x:1, y:0};
    }

    // 鍵盤監聽（修復點）
    window.addEventListener('keydown', (e) => {
        switch(e.key) {
            case 'ArrowUp': setDirection('UP'); break;
            case 'ArrowDown': setDirection('DOWN'); break;
            case 'ArrowLeft': setDirection('LEFT'); break;
            case 'ArrowRight': setDirection('RIGHT'); break;
            case ' ': isPaused = !isPaused; break;
        }
    });

    setInterval(() => {
        if(isPaused) return;
        let head = {x: snake[0].x+nextDir.x, y: snake[0].y+nextDir.y};
        if(head.x<0||head.x>19||head.y<0||head.y>19 || snake.some(s => s.x===head.x && s.y===head.y)) {
            alert("GAME OVER"); isPaused=true; snake=[{x:10, y:10}]; nextDir={x:1, y:0};
        } else {
            snake.unshift(head);
            if(head.x===food.x && head.y===food.y) food={x:Math.floor(Math.random()*20), y:Math.floor(Math.random()*20)};
            else snake.pop();
        }
        draw();
    }, 200);

    document.getElementById('startBtn').onclick = () => isPaused = !isPaused;
    document.querySelectorAll('.d-btn').forEach(b => {
        b.onclick = () => setDirection(b.getAttribute('data-dir'));
    });
    draw();
</script>
</body>
</html>
