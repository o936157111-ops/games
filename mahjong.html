<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台灣 16 張麻將</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: #166133; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { background: rgba(0,0,0,0.55); padding: 10px; text-align: center; }
        #gameTable { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #actionPanel { display: none; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; z-index: 100; flex-direction: column; gap: 10px; }
        .action-row { display: flex; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
        #hand { display: flex; gap: 5px; margin-top: 20px; }
        .tile { background: #fff; color: #000; padding: 10px; border-radius: 5px; cursor: pointer; border: 1px solid #ccc; }
        .meld-group { display: flex; border: 1px solid #fff; margin: 5px; }
        .meld-group .tile { background: #eee; }
    </style>
</head>
<body>

<div id="header"><h2>台灣 16 張麻將</h2><div id="msg">遊戲開始</div></div>
<div id="gameTable">
    <div id="actionPanel">
        <div class="action-row" id="actionBtns"></div>
        <div id="eatSubPanel" style="display:none;"></div>
    </div>
    <div id="meldsArea" style="display:flex;"></div>
    <div id="hand"></div>
</div>

<script>
    const suits = ['萬', '筒', '條'];
    const tileUnicode = {'1萬':'🀇','2萬':'🀈','3萬':'🀉','4萬':'🀊','5萬':'🀋','6萬':'🀌','7萬':'🀍','8萬':'🀎','9萬':'🀏','1筒':'🀙','2筒':'🀚','3筒':'🀛','4筒':'🀜','5筒':'🀝','6筒':'🀞','7筒':'🀟','8筒':'🀠','9筒':'🀡','1條':'🀐','2條':'🀑','3條':'🀒','4條':'🀓','5條':'🀔','6條':'🀕','7條':'🀖','8條':'🀗','9條':'🀘','東':'🀀','南':'🀁','西':'🀂','北':'🀃','中':'🀄','發':'🀅','白':'🀆'};
    
    let deck = [], players = [{name:"你", hand:[], melds:[]}, {name:"下家", hand:[], melds:[]}, {name:"對家", hand:[], melds:[]}, {name:"上家", hand:[], melds:[]}], 
        currentTurn = 0, lastDiscardedTile = null, activeEatOptions = [];

    function initGame() {
        deck = [];
        suits.forEach(s => { for(let i=1; i<=9; i++) for(let j=0; j<4; j++) deck.push({name: i+s, suit: s, val: i, code: i+s}); });
        ['東','南','西','北','中','發','白'].forEach(h => { for(let j=0; j<4; j++) deck.push({name: h, suit: '字', val: 99, code: h}); });
        deck.sort(() => Math.random() - 0.5);
        players.forEach(p => { p.hand = []; for(let i=0; i<16; i++) p.hand.push(deck.pop()); p.hand.sort((a,b) => a.val - b.val); });
        render();
    }

    // 核心修正：嚴格的吃牌邏輯判斷
    function interceptSystem(tile, shooterIdx) {
        if (shooterIdx === 3 && tile.suit !== '字') { // 只有上家打出萬筒條才能吃
            let v = tile.val, s = tile.suit, hand = players[0].hand;
            let has = (val) => hand.find(t => t.suit === s && t.val === val);
            
            activeEatOptions = [];
            if (v >= 3 && has(v-2) && has(v-1)) activeEatOptions.push([v-2, v-1]);
            if (v >= 2 && v <= 8 && has(v-1) && has(v+1)) activeEatOptions.push([v-1, v+1]);
            if (v <= 7 && has(v+1) && has(v+2)) activeEatOptions.push([v+1, v+2]);
            
            if (activeEatOptions.length > 0) {
                showActionPanel(['吃', '過']);
                return;
            }
        }
        document.getElementById('msg').innerText = "無人可吃";
    }

    function executeEat(opt) {
        let hand = players[0].hand, tile = lastDiscardedTile;
        let t1 = hand.splice(hand.findIndex(t => t.suit === tile.suit && t.val === opt[0]), 1)[0];
        let t2 = hand.splice(hand.findIndex(t => t.suit === tile.suit && t.val === opt[1]), 1)[0];
        players[0].melds.push([t1, tile, t2]); // 確保 tile 在中間
        render();
    }

    function showActionPanel(actions) {
        const btnDiv = document.getElementById('actionBtns');
        btnDiv.innerHTML = '';
        actions.forEach(act => {
            let btn = document.createElement('button');
            btn.innerText = act;
            btn.onclick = () => {
                if (act === '吃') {
                    if (activeEatOptions.length === 1) executeEat(activeEatOptions[0]);
                    else {
                        // 顯示多個吃牌組合選項
                        document.getElementById('eatSubPanel').style.display = 'block';
                        activeEatOptions.forEach(opt => {
                            let subBtn = document.createElement('button');
                            subBtn.innerText = `用 ${opt[0]}${opt[1]} 吃`;
                            subBtn.onclick = () => { executeEat(opt); document.getElementById('actionPanel').style.display='none'; };
                            document.getElementById('eatSubPanel').appendChild(subBtn);
                        });
                    }
                } else { document.getElementById('actionPanel').style.display = 'none'; }
            };
            btnDiv.appendChild(btn);
        });
        document.getElementById('actionPanel').style.display = 'flex';
    }

    function render() {
        document.getElementById('hand').innerHTML = players[0].hand.map(t => `<div class="tile">${tileUnicode[t.code]}</div>`).join('');
        document.getElementById('meldsArea').innerHTML = players[0].melds.map(m => `<div class="meld-group">${m.map(t=>`<div class="tile">${tileUnicode[t.code]}</div>`).join('')}</div>`).join('');
    }

    initGame();
    // 模擬：上家打出一張 2 萬，測試吃牌邏輯
    setTimeout(() => {
        lastDiscardedTile = {name: '2萬', suit: '萬', val: 2, code: '2萬'};
        document.getElementById('msg').innerText = "上家打出 2 萬";
        interceptSystem(lastDiscardedTile, 3);
    }, 1000);
</script>
</body>
</html>
