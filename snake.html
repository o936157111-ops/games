<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>貪食蛇 - 最終完美版</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-container {
            width: 90vw;
            max-width: 400px;
            /* 關鍵：設定高度為 95vh，同時確保內容不會溢出 */
            height: 95vh;
            max-height: 800px;
            background-color: #333;
            border: 6px solid #444;
            border-radius: 25px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .screen {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #8fa382;
            border: 8px solid #111;
            /* 讓遊戲區彈性縮放，但不要超過剩餘空間 */
            flex: 1;
            min-height: 0; 
            overflow: hidden;
        }

        canvas { width: 100%; height: 100%; display: block; object-fit: contain; }

        .control-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            /* 嚴格限制操作區高度 */
            height: 100px;
            flex-shrink: 0;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            align-items: center;
        }

        .d-btn {
            background-color: #222;
            color: #fff;
            border: 3px solid #555;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
        }

        #startBtn {
            background: #555;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="screen">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>
    
    <div class="control-area">
        <div class="d-pad">
            <button class="d-btn" style="grid-column: 2;" data-dir="UP">▲</button>
            <button class="d-btn" style="grid-column: 1; grid-row: 2;" data-dir="LEFT">◀</button>
            <button class="d-btn" style="grid-column: 3; grid-row: 2;" data-dir="RIGHT">▶</button>
            <button class="d-btn" style="grid-column: 2; grid-row: 3;" data-dir="DOWN">▼</button>
        </div>
        <button id="startBtn">START / PAUSE</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let snake = [{x:10, y:10}], food = {x:5, y:5}, nextDir={x:1, y:0}, isPaused=true;
    
    function draw() {
        ctx.fillStyle = '#8fa382'; ctx.fillRect(0,0,400,400);
        ctx.fillStyle = '#2b3a22';
        snake.forEach(p => ctx.fillRect(p.x*20+1, p.y*20+1, 18, 18));
        ctx.fillStyle = '#1a2414'; ctx.fillRect(food.x*20+2, food.y*20+2, 16, 16);
    }

    function setDir(dir) {
        if(isPaused) return;
        if(dir==='UP'&&nextDir.y!==1) nextDir={x:0, y:-1};
        else if(dir==='DOWN'&&nextDir.y!==-1) nextDir={x:0, y:1};
        else if(dir==='LEFT'&&nextDir.x!==1) nextDir={x:-1, y:0};
        else if(dir==='RIGHT'&&nextDir.x!==-1) nextDir={x:1, y:0};
    }

    window.addEventListener('keydown', e => {
        if(e.key==='ArrowUp') setDir('UP');
        if(e.key==='ArrowDown') setDir('DOWN');
        if(e.key==='ArrowLeft') setDir('LEFT');
        if(e.key==='ArrowRight') setDir('RIGHT');
        if(e.key===' ') isPaused = !isPaused;
    });

    document.getElementById('startBtn').onclick = () => isPaused = !isPaused;
    document.querySelectorAll('.d-btn').forEach(b => b.onclick = () => setDir(b.getAttribute('data-dir')));

    setInterval(() => {
        if(isPaused) return;
        let head = {x: snake[0].x+nextDir.x, y: snake[0].y+nextDir.y};
        if(head.x<0||head.x>19||head.y<0||head.y>19 || snake.some(s => s.x===head.x && s.y===head.y)) {
            alert("GAME OVER"); isPaused=true; snake=[{x:10, y:10}]; nextDir={x:1, y:0};
        } else {
            snake.unshift(head);
            if(head.x===food.x && head.y===food.y) food={x:Math.floor(Math.random()*20), y:Math.floor(Math.random()*20)};
            else snake.pop();
        }
        draw();
    }, 200);

    draw();
</script>
</body>
</html>
