<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>貪食蛇 - 手機友善放大版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: #222;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 10px;
        }

        /* 放大容器比例 */
        .phone-container {
            height: 95vh;            /* 盡量填滿手機垂直空間 */
            width: 100%;             /* 寬度盡量展開 */
            max-width: 450px;        /* 設定合適的最大寬度 */
            background-color: #333;
            border: 6px solid #444;
            border-radius: 25px;
            padding: 3vh;
            display: flex;
            flex-direction: column;
            gap: 2vh;
        }

        .screen {
            flex: 2; /* 讓遊戲區域佔更大比例 */
            background-color: #8fa382;
            border: 8px solid #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { width: 100%; height: auto; display: block; }

        .btn-area { width: 100%; display: flex; flex-direction: column; gap: 1.5vh; }
        
        /* START 按鈕明顯放大 */
        .btn { 
            width: 100%; 
            padding: 2vh; 
            background: #555; 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-size: 5vw; /* 依螢幕寬度放大字體 */
            font-weight: bold; 
        }

        /* D-pad 重新設計：按鈕變大，間距拉開 */
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3vw;
            padding: 1vh;
        }

        .d-btn {
            background-color: #222;
            color: #fff;
            border: 3px solid #555;
            border-radius: 50%;
            width: 18vw;  /* 按鈕寬度變大 */
            height: 18vw;
            font-size: 8vw; /* 方向箭頭符號放大 */
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 0 #111;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="screen">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>
    <div class="btn-area">
        <button id="startBtn" class="btn">START / PAUSE</button>
        <div class="d-pad">
            <button class="d-btn" style="grid-column: 2;" data-dir="UP">▲</button>
            <button class="d-btn" style="grid-column: 1; grid-row: 2;" data-dir="LEFT">◀</button>
            <button class="d-btn" style="grid-column: 3; grid-row: 2;" data-dir="RIGHT">▶</button>
            <button class="d-btn" style="grid-column: 2; grid-row: 3;" data-dir="DOWN">▼</button>
        </div>
    </div>
</div>

<script>
    // [這裡請保留原有的 JavaScript 遊戲邏輯，完全不需要更動]
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let snake = [{x:10, y:10}], food = {x:5, y:5}, nextDir={x:1, y:0}, isPaused=true;
    
    function draw() {
        ctx.fillStyle = '#8fa382'; ctx.fillRect(0,0,400,400);
        ctx.fillStyle = '#2b3a22';
        snake.forEach(p => ctx.fillRect(p.x*20+1, p.y*20+1, 18, 18));
        ctx.fillStyle = '#1a2414'; ctx.fillRect(food.x*20+2, food.y*20+2, 16, 16);
    }

    function setDir(dir) {
        if(isPaused) return;
        if(dir==='UP'&&nextDir.y!==1) nextDir={x:0, y:-1};
        else if(dir==='DOWN'&&nextDir.y!==-1) nextDir={x:0, y:1};
        else if(dir==='LEFT'&&nextDir.x!==1) nextDir={x:-1, y:0};
        else if(dir==='RIGHT'&&nextDir.x!==-1) nextDir={x:1, y:0};
    }

    window.addEventListener('keydown', e => {
        if(e.key==='ArrowUp') setDir('UP');
        if(e.key==='ArrowDown') setDir('DOWN');
        if(e.key==='ArrowLeft') setDir('LEFT');
        if(e.key==='ArrowRight') setDir('RIGHT');
        if(e.key===' ') isPaused = !isPaused;
    });

    document.getElementById('startBtn').onclick = () => isPaused = !isPaused;
    document.querySelectorAll('.d-btn').forEach(b => b.onclick = () => setDir(b.getAttribute('data-dir')));

    setInterval(() => {
        if(isPaused) return;
        let head = {x: snake[0].x+nextDir.x, y: snake[0].y+nextDir.y};
        if(head.x<0||head.x>19||head.y<0||head.y>19 || snake.some(s => s.x===head.x && s.y===head.y)) {
            alert("GAME OVER"); isPaused=true; snake=[{x:10, y:10}]; nextDir={x:1, y:0};
        } else {
            snake.unshift(head);
            if(head.x===food.x && head.y===food.y) food={x:Math.floor(Math.random()*20), y:Math.floor(Math.random()*20)};
            else snake.pop();
        }
        draw();
    }, 200);

    draw();
</script>
</body>
</html>
