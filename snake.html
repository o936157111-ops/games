<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>貪食蛇 - 按鈕大小修正版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: #222;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .phone-container {
            height: 90vmin;
            width: calc(90vmin * 0.55);
            background-color: #333;
            border: 4px solid #444;
            border-radius: 20px;
            padding: 2vmin;
            display: flex;
            flex-direction: column;
            gap: 1.5vmin;
        }

        .screen {
            flex: 1;
            background-color: #8fa382;
            border: 4px solid #111;
        }

        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }

        .btn-area { width: 100%; display: flex; flex-direction: column; gap: 1vmin; }
        .btn { width: 100%; padding: 1.5vmin; background: #555; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }

        /* 關鍵修正：改用 Flex 排列，並嚴格限制按鈕大小 */
        .d-pad {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1vmin;
            padding: 1vmin;
        }

        .d-btn {
            background-color: #222;
            color: #fff;
            border: 2px solid #444;
            border-radius: 50%;
            width: 8vmin;  /* 改用 vmin 固定大小，不再隨 Grid 擴張 */
            height: 8vmin;
            font-size: 2vmin;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="screen">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>
    <div class="btn-area">
        <button id="startBtn" class="btn">START / PAUSE</button>
        <div class="d-pad">
            <button class="d-btn" data-dir="LEFT">◀</button>
            <div style="display:flex; flex-direction:column; gap:1vmin;">
                <button class="d-btn" data-dir="UP">▲</button>
                <button class="d-btn" data-dir="DOWN">▼</button>
            </div>
            <button class="d-btn" data-dir="RIGHT">▶</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let snake = [{x:10, y:10}], food = {x:5, y:5}, nextDir={x:1, y:0}, isPaused=true;
    
    function draw() {
        ctx.fillStyle = '#8fa382'; ctx.fillRect(0,0,400,400);
        ctx.fillStyle = '#2b3a22';
        snake.forEach(p => ctx.fillRect(p.x*20+1, p.y*20+1, 18, 18));
        ctx.fillStyle = '#1a2414'; ctx.fillRect(food.x*20+2, food.y*20+2, 16, 16);
    }

    function setDir(dir) {
        if(isPaused) return;
        if(dir==='UP'&&nextDir.y!==1) nextDir={x:0, y:-1};
        else if(dir==='DOWN'&&nextDir.y!==-1) nextDir={x:0, y:1};
        else if(dir==='LEFT'&&nextDir.x!==1) nextDir={x:-1, y:0};
        else if(dir==='RIGHT'&&nextDir.x!==-1) nextDir={x:1, y:0};
    }

    window.addEventListener('keydown', e => {
        if(e.key==='ArrowUp') setDir('UP');
        if(e.key==='ArrowDown') setDir('DOWN');
        if(e.key==='ArrowLeft') setDir('LEFT');
        if(e.key==='ArrowRight') setDir('RIGHT');
        if(e.key===' ') isPaused = !isPaused;
    });

    document.getElementById('startBtn').onclick = () => isPaused = !isPaused;
    document.querySelectorAll('.d-btn').forEach(b => b.onclick = () => setDir(b.getAttribute('data-dir')));

    setInterval(() => {
        if(isPaused) return;
        let head = {x: snake[0].x+nextDir.x, y: snake[0].y+nextDir.y};
        if(head.x<0||head.x>19||head.y<0||head.y>19 || snake.some(s => s.x===head.x && s.y===head.y)) {
            alert("GAME OVER"); isPaused=true; snake=[{x:10, y:10}]; nextDir={x:1, y:0};
        } else {
            snake.unshift(head);
            if(head.x===food.x && head.y===food.y) food={x:Math.floor(Math.random()*20), y:Math.floor(Math.random()*20)};
            else snake.pop();
        }
        draw();
    }, 200);

    draw();
</script>
</body>
</html>
