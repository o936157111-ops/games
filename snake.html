<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>經典復古貪食蛇 - 完美比例版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

        body {
            background-color: #222;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 這是你截圖中的「整個長方形框架」 */
        .phone-container {
            /* 使用 vmin 確保在寬或高較短的邊上自動縮放，維持比例 */
            height: 90vmin;
            width: calc(90vmin * 0.55); /* 寬度是高度的約 55% */
            background-color: #333;
            border: 4px solid #444;
            border-radius: 20px;
            padding: 2vmin;
            display: flex;
            flex-direction: column;
            gap: 2vmin;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .screen {
            background-color: #8fa382;
            border: 4px solid #111;
            width: 100%;
            aspect-ratio: 1 / 1.2; /* 螢幕區域比例 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { width: 100%; height: 100%; object-fit: contain; }

        .btn-area { display: flex; flex-direction: column; gap: 1vmin; }
        .btn { padding: 1.5vmin; background: #555; color: #fff; border: none; border-radius: 8px; font-weight: bold; }

        .d-pad { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 1vmin; 
        }
        .d-btn { 
            background: #222; color: #fff; border: 2px solid #444; 
            border-radius: 50%; aspect-ratio: 1/1; font-size: 2vmin; 
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="screen">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>
    <div class="btn-area">
        <button id="startBtn" class="btn">START / PAUSE</button>
        <div class="d-pad">
            <button class="d-btn" style="grid-column: 2;" data-dir="UP">▲</button>
            <button class="d-btn" style="grid-column: 1; grid-row: 2;" data-dir="LEFT">◀</button>
            <button class="d-btn" style="grid-column: 3; grid-row: 2;" data-dir="RIGHT">▶</button>
            <button class="d-btn" style="grid-column: 2; grid-row: 3;" data-dir="DOWN">▼</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let snake = [{x:10, y:10}], food = {x:5, y:5}, nextDir={x:1, y:0}, isPaused=true;
    
    function draw() {
        ctx.fillStyle = '#8fa382'; ctx.fillRect(0,0,400,400);
        ctx.fillStyle = '#2b3a22';
        snake.forEach(p => ctx.fillRect(p.x*20+1, p.y*20+1, 18, 18));
        ctx.fillStyle = '#1a2414'; ctx.fillRect(food.x*20+2, food.y*20+2, 16, 16);
    }

    function setDir(dir) {
        if(isPaused) return;
        if(dir==='UP'&&nextDir.y!==1) nextDir={x:0, y:-1};
        else if(dir==='DOWN'&&nextDir.y!==-1) nextDir={x:0, y:1};
        else if(dir==='LEFT'&&nextDir.x!==1) nextDir={x:-1, y:0};
        else if(dir==='RIGHT'&&nextDir.x!==-1) nextDir={x:1, y:0};
    }

    // 鍵盤與按鈕共用邏輯
    window.addEventListener('keydown', e => {
        if(e.key==='ArrowUp') setDir('UP');
        if(e.key==='ArrowDown') setDir('DOWN');
        if(e.key==='ArrowLeft') setDir('LEFT');
        if(e.key==='ArrowRight') setDir('RIGHT');
        if(e.key===' ') isPaused = !isPaused;
    });

    document.getElementById('startBtn').onclick = () => isPaused = !isPaused;
    document.querySelectorAll('.d-btn').forEach(b => b.onclick = () => setDir(b.getAttribute('data-dir')));

    setInterval(() => {
        if(isPaused) return;
        let head = {x: snake[0].x+nextDir.x, y: snake[0].y+nextDir.y};
        if(head.x<0||head.x>19||head.y<0||head.y>19 || snake.some(s => s.x===head.x && s.y===head.y)) {
            alert("GAME OVER"); isPaused=true; snake=[{x:10, y:10}]; nextDir={x:1, y:0};
        } else {
            snake.unshift(head);
            if(head.x===food.x && head.y===food.y) food={x:Math.floor(Math.random()*20), y:Math.floor(Math.random()*20)};
            else snake.pop();
        }
        draw();
    }, 200);

    draw();
</script>
</body>
</html>
