<!DOCTYPE html>

<head>

    <style>
        :root {
            --bg-color: #faf6eb; 
            --line-color: #3a3226;
        }
        * { box-sizing: border-box; }
        body {
            background-color: #f0ebe0; 
            font-family: 'Courier New', Courier, monospace, "微軟正黑體";
            margin: 0;
            padding: 10px; 
            display: flex;
            flex-direction: column;      /* 關鍵：強制垂直排列，讓廣告在遊戲上方 */
            align-items: center;         /* 關鍵：水平置中 */
            justify-content: flex-start; /* 改為 flex-start 讓內容從頂部開始排，不會被隱藏 */
            min-height: 100vh;
            min-height: 100dvh; 
            overflow: auto;              /* 改為 auto，確保內容長度超過螢幕時可以滾動 */
        }
        
        #scroll-container {
            width: 100%;
            max-width: 450px; 
            height: 90vh;
            height: 90dvh; 
            background-color: var(--bg-color);
            border: 6px solid #8d7a5f;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden; 
            position: relative;
        }
        
        .section {
            height: 100%; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            align-items: center;
            padding: 20px 25px; 
            text-align: center;
            position: relative;
            flex-shrink: 0; 
        }
        
        .doodle-container {
            font-size: 24px; 
            letter-spacing: 12px; 
            padding-left: 12px; 
            user-select: none;
            opacity: 0.8;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            white-space: nowrap; 
            overflow: hidden;
            flex-shrink: 0; 
        }
        
        .content-block {
            width: 100%;
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            overflow: hidden; 
        }
        
        h1, h2, p {
            color: var(--line-color);
            margin: 6px 0;
            word-break: break-all; 
        }
        
        h2 { 
            font-size: 1.15rem; 
            white-space: nowrap; 
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        p { font-size: 0.95rem; line-height: 1.4; }
        
        input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid var(--line-color);
            background: #fff;
            text-align: center;
            margin: 12px 0;
            border-radius: 4px;
            width: 90%;
            max-width: 280px;
        }
        
        .btn {
            background-color: var(--line-color);
            color: var(--bg-color);
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: transform 0.1s;
            margin: 5px 0;
            flex-shrink: 0;
        }
        .btn:active { transform: scale(0.95); }
        
        .choice-container {
            display: flex;
            gap: 30px;
            margin: 12px 0;
            flex-shrink: 0;
        }
        
        .choice-btn {
            background: #fff;
            border: 3px dashed var(--line-color);
            color: var(--line-color);
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .choice-btn:hover { background-color: #f5eedc; }
        
        .badge {
            font-size: 11px;
            border: 1px solid var(--line-color);
            padding: 3px 8px;
            margin-bottom: 12px;
            transform: rotate(-2deg);
            background: #fff;
            display: inline-block;
        }
        
        .dynamic-keyword {
            color: #b85c00;
            font-weight: bold;
            text-decoration: underline;
        }
        
        @media (max-height: 650px) {
            #scroll-container { height: 92dvh; }
            .doodle-container { font-size: 18px; height: 25px; }
            .section { padding: 8px 15px; }
            h2 { font-size: 1.05rem; }
            p { font-size: 0.85rem; margin: 4px 0; }
            input { margin: 8px 0; padding: 8px; }
            .choice-btn { width: 50px; height: 50px; font-size: 15px; }
            .btn { padding: 10px 25px; font-size: 15px; }
        }
    </style>
</head>
<body>

    <!-- 關卡 5 -->

                <button class="choice-btn" onclick="makeChoice(5, 'X')">✕</button>
                <button class="choice-btn" onclick="makeChoice(5, 'O')">◯</button>

        <div class="doodle-container class-doodle-bottom"></div>

            <h1 style="font-size: 2rem; margin-bottom: 5px;">🎉 奇蹟通關！</h1>
            <p id="victory-msg">恭喜！你成功用高超的直覺完成了這趟冒險！</p>
            <div class="badge" id="boss-fate" style="font-size: 13px; color: #a00; font-weight: bold; padding: 10px; transform: rotate(1deg); margin-top: 10px; white-space: normal; width: 90%;"></div>
            <button class="btn" onclick="restartGame()">重新洗牌，再次應戰</button>
        </div>
        <div class="doodle-container class-doodle-bottom"></div>
    </div>

</div>

<script>
    let currentStage = 0;
    let target = "日常生活瑣事";
    let activePunishments = [];
    let activeFates = [];
    const totalStages = 6; 
    const container = document.getElementById('scroll-container');
    let correctAnswers = { 1: 'left', 2: 'A', 3: 'red', 4: 'up', 5: 'X' };

    const doodlePool = ["👾", "🚀", "🛸", "👻", "🦖", "🍦", "🎈", "🎨", "🧩", "🎲", "🐱", "🐶", "🦊", "🌟", "🔥", "🤖", "🍕", "🍟", "🛹", "🔮"];

    // 🌟 AI 智慧核心：劇本資料庫
    const storyDatabase = {
        work: {
            keywords: ["班", "工作", "程式", "開會", "主管", "老闆", "報告", "上學", "考試", "作業", "上課", "打卡"],
            stages: [
                { title: "【第 1 關：突襲早會】", desc: "打卡鐘響起！遠處傳來 ${kw} 的腳步聲，你發現前面的會議室大門虛掩著，該往哪邊閃躲躲過這場劫難？" },
                { title: "【第 2 關：奪命奪魂信】", desc: "叮咚！信箱突然跳出一封標題寫著 ${kw} 的特急郵件！在呼吸困難的情況下，你決定盲選一個應對策略：" },
                { title: "【第 3 關：全面當機】", desc: "電腦螢幕突然一黑，竟然跳出了 ${kw} 的滿版錯誤畫面！快！按哪顆鍵能啟動辦公室的求生密碼？" },
                { title: "【第 4 關：茶水間修羅場】", desc: "你想去茶水間偷懶，結果一開門發現 ${kw} 正站在咖啡機前！在對到眼的一瞬間，該往哪個方向發射裝傻眼神？" },
                { title: "【第 5 關：最後的逃生梯】", desc: "快到下班時間了！${kw} 居然拿著一疊資料在電梯口堵人！這是最後的對決，全力一搏拉開安全門吧！" }
            ],
            punishments: [
                "逃跑失敗，被抓回辦公室留下來加班到半夜！退回起點！",
                "選錯了！被主管抓到你在摸魚，罰寫悔過書並退回起點！",
                "不小心按到群組全員標記，瞬間成為焦點，尷尬退回起點！"
            ],
            fates: ["已經被自動轉寄給離職部門，再也不會出現在你的行事曆上了！", "剛才被天外飛來的資遣費（或停課通知）砸中，徹底消失了！"]
        },
        life: {
            keywords: ["洗碗", "下雨", "打掃", "減肥", "運動", "垃圾", "起床", "塞車", "看醫生", "排隊", "煮飯"],
            stages: [
                { title: "【第 1 關：絕望的家務】", desc: "一打開門，迎面而來的就是堆積如山的 ${kw}...！心理防線瞬間崩潰，你決定倒退嚕還是往旁邊逃？" },
                { title: "【第 2 關：命運的十字路】", desc: "正當你想摸魚時，空中突然打雷，彷彿在警告你逃避 ${kw} 的後果！此時前方出現兩個路標：" },
                { title: "【第 3 關：手機斷網危機】", desc: "糟糕！正在研究怎麼解決 ${kw} 時，手機電力只剩1%！在螢幕熄滅前，按哪一個按鈕才能召喚工具人？" },
                { title: "【第 4 關：鄰居的關切】", desc: "隔壁的大嬸走過來，大聲問你今天 ${kw} 做了沒？為了避免尷尬延伸，該往哪邊假裝接電話逃走？" },
                { title: "【第 5 關：解脫的終點】", desc: "太好了，眼看著 ${kw} 就要被你甩掉了，它竟然化身成一坨迷霧做最後掙扎！使出你的童年大絕招，衝啊！" }
            ],
            punishments: [
                "腳底踩到滑溜溜的肥皂（或垃圾袋），滑了個大跟斗退回起點！",
                "選錯了！泡麵的調味包油污噴到白色衣服上，崩潰退回重來！",
                "一出門驚覺沒帶鑰匙，只能在門口罰站並退回起點！"
            ],
            fates: ["突然被掃地機器人（或超強除濕機）吸走，家裡變得一片清爽！", "化作一縷輕煙，自動被沖進馬桶徹底消失了！"]
        },
        social: {
            keywords: ["前男友", "前女友", "親戚", "客戶", "路人", "朋友", "聚會", "敬酒", "尬聊", "推銷"],
            stages: [
                { title: "【第 1 關：街頭偶遇】", desc: "遠遠看到前方走來的竟然是 ${kw}！你手上的飲料差點驚掉，該往哪邊急轉彎才能裝作不認識？" },
                { title: "【第 2 關：群組修羅場】", desc: "完蛋，不小心被拉進一個充滿 ${kw} 的大型聊天室！為了不引人注目，你必須做出的第一個舉動是：" },
                { title: "【第 3 關：奪命追魂摳】", desc: "手機突然瘋狂震動，螢幕上赫然顯示 ${kw} 來電！按哪顆按鈕可以假裝訊號不好斷線？" },
                { title: "【第 4 關：空氣突然安靜】", desc: "聚會上，大夥突然聊到 ${kw}，氣氛降到冰點！為了打破這個可怕的沉默，你要往哪邊看？" },
                { title: "【第 5 關：最後的微笑】", desc: "面具快戴不下去了！${kw} 走過來想跟你進行靈魂對談，這是最後的防線，拿出你最完美的官腔迎戰吧！" }
            ],
            punishments: [
                "被抓去尬聊了三小時，精神當場耗盡，退回起點！",
                "選錯了！回覆訊息時手滑傳錯貼圖，世界級尷尬退回重來！",
                "假裝沒看到卻迎面撞上電線桿，引來所有人注目，痛心退回起點！"
            ],
            fates: ["被一鍵加入黑名單外加封鎖，這輩子再也不會打擾你！", "被突然出現的世紀婚禮（或超級大八卦）吸引走，再也不理你了！"]
        },
        money: {
            keywords: ["沒錢", "窮", "股票", "跌", "帳單", "卡刷爆", "吃土", "破產", "物價", "買不起"],
            stages: [
                { title: "【第 1 關：看著餘額流淚】", desc: "打開網路銀行，發現裡面的餘額因為 ${kw} 變得慘不忍睹！為了重拾勇氣，你決定閉著眼睛往哪翻？" },
                { title: "【第 2 關：購物車的審判】", desc: "想買個東西犒賞自己，結帳時卻跳出 ${kw} 的紅字警告！心跳加速的你決定選擇哪個秘密帳戶？" },
                { title: "【第 3 關：突來的中獎信】", desc: "正在為 ${kw} 發愁，突然收到一封自稱中獎的簡訊！按哪顆按鈕才能辨識這是不是詐騙？" },
                { title: "【第 4 關：發票的逆襲】", desc: "你在口袋深處摸到一張發票，這可能是拯救你脫離 ${kw} 的唯一希望！該往哪邊拉開它對獎？" },
                { title: "【第 5 關：財富自由之門】", desc: "只要衝過這道門，${kw} 的詛咒就會自動解除！拿出你僅存的最後一塊錢硬幣當作護身符，衝啊！" }
            ],
            punishments: [
                "不小心又手滑下單了一件廢物，荷包再度失血，絕望退回起點！",
                "選錯了！踩到路邊的黃金卻發現不是真的黃金，悲催退回重來！",
                "發票打開發現中了1000萬……但那是上個月到期的發票！痛心退回起點！"
            ],
            fates: ["突然變成了大樂透頭獎號碼，讓你瞬間財富自由，這痛苦隨風而去！", "被突然降臨的超級財神爺一腳踢飛，變成了一堆發光的金幣！"]
        },
        default: { // 萬用奇幻劇本
            stages: [
                { title: "【第 1 關：封印解除】", desc: "一陣強光閃過，紙捲上封印的古老怨念 ${kw} 居然活過來了！你感到空氣在震動，要往哪邊跨出第一步？" },
                { title: "【第 2 關：異世界的試煉】", desc: "這裡的天空是紫色的，所有的怪物都長得像 ${kw}！面對這荒謬的景象，你的直覺選擇是：" },
                { title: "【第 3 關：命運的神秘符號】", desc: "迷宮牆上刻著閃閃發光的魔法陣，似乎是消除 ${kw} 的關鍵。你要按下哪一個符號來驅動魔法？" },
                { title: "【第 4 關：幻覺的干擾】", desc: "耳邊突然響起奇妙的幻聽，一直呼喚著 ${kw} 的名字！快搖搖頭，往哪邊跑才能擺脫這個催眠？" },
                { title: "【第 5 關：造物主的考驗】", desc: "終於來到終點的傳送門，${kw} 聚集成了最終的大魔王！發揮你的童心力量，給它最後一擊吧！" }
            ],
            punishments: [
                "被魔法亂流捲回起點，衣服還變成了奇怪的顏色！",
                "選錯了！被關進無厘頭的時空迴圈，一陣頭暈目眩後退回起點！",
                "踩到隱形傳送陣，咻的一聲被傳送回起點重來！"
            ],
            fates: ["被自動打包發射到外太空，變成了夜空中最亮的一顆死星！", "被碎紙機切成碎片，變成了這條紙捲迷宮的背景裝飾！"]
        }
    };

    // 🌟 AI 智慧語意分析引擎
    function analyzeTheme(inputtext) {
        for (let themeKey in storyDatabase) {
            if (themeKey === 'default') continue;
            const keywords = storyDatabase[themeKey].keywords;
            // 只要玩家輸入的字包含任何一個關鍵字，就判定為該主題
            if (keywords.some(kw => inputtext.includes(kw))) {
                return themeKey;
            }
        }
        return 'default'; // 找不到就用萬用腳本
    }

    function generateRandomDoodles() {
        const topContainers = document.querySelectorAll('.class-doodle-top');
        const bottomContainers = document.querySelectorAll('.class-doodle-bottom');
        function makeDoodleString(count) {
            let result = "";
            for(let i = 0; i < count; i++) {
                result += doodlePool[Math.floor(Math.random() * doodlePool.length)];
            }
            return result;
        }
        topContainers.forEach(el => el.innerHTML = makeDoodleString(4));
        bottomContainers.forEach(el => el.innerHTML = makeDoodleString(4));
    }

    // 🌟 核心：根據語意分析結果，動態生成完全不同的關卡內容
    function updateStoryScript(kw) {
        const theme = analyzeTheme(kw);
        const selectedScript = storyDatabase[theme];
        const spanKw = `<span class="dynamic-keyword">${kw}</span>`;
        
        // 注入關卡劇本
        for (let i = 1; i <= 5; i++) {
            const stageData = selectedScript.stages[i-1];
            document.getElementById(`title-${i}`).innerHTML = stageData.title;
            // 將 ${kw} 標籤替換成玩家輸入的漂亮字串
            document.getElementById(`desc-${i}`).innerHTML = stageData.desc.replace("${kw}", spanKw);
        }

        // 快取該主題的懲罰與結局庫
        activePunishments = selectedScript.punishments;
        activeFates = selectedScript.fates;
    }

    function randomizeAnswers() {
        correctAnswers[1] = Math.random() < 0.5 ? 'left' : 'right';
        correctAnswers[2] = Math.random() < 0.5 ? 'A' : 'B';
        correctAnswers[3] = Math.random() < 0.5 ? 'red' : 'blue';
        correctAnswers[4] = Math.random() < 0.5 ? 'up' : 'down';
        correctAnswers[5] = Math.random() < 0.5 ? 'X' : 'O';
    }

    function startGame() {
        const inputVal = document.getElementById('target-name').value;
        if(inputVal.trim() !== "") {
            target = inputVal;
        }
        
        updateStoryScript(target); // 分析語意並部署對應劇本
        randomizeAnswers(); 
        generateRandomDoodles(); 
        nextStage();
    }

    function makeChoice(stageNum, playerChoice) {
        if (playerChoice === correctAnswers[stageNum]) {
            nextStage();
        } else {
            // 從對應主題的懲罰庫抽籤
            const randomPunish = activePunishments[Math.floor(Math.random() * activePunishments.length)];
            alert(`❌ 【慘遭懲罰】\n\n${randomPunish}`);
            restartGame();
        }
    }

    function nextStage() {
        currentStage++;
        
        if(currentStage === totalStages) {
            // 從對應主題的結局庫抽籤
            const randomFate = activeFates[Math.floor(Math.random() * activeFates.length)];
            document.getElementById('boss-fate').innerText = `⚠️ 終極捷報：【${target}】${randomFate}`;
        }

        container.scrollTo({
            top: currentStage * container.clientHeight,
            behavior: 'smooth'
        });
    }

    function restartGame() {
        currentStage = 0;
        generateRandomDoodles(); 
        container.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    }

    window.onload = function() {
        generateRandomDoodles();
    };
</script>
